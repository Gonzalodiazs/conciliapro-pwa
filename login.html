<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F7F5F0">
<title>AIPROTECH · Acceso Repartidor</title>
<script src="./vendor/cp-auth.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;600&display=swap');
:root{--bg:#F7F5F0;--panel:#FFFFFF;--panel-2:#FBF9F4;--line:#E8E4D9;--line-2:#D6D1C3;--ink:#232A33;--ink-dim:#5C6573;--ink-faint:#616A78;--green:#1E7F54;--red:#C8402E;--blue:#2E66C9;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;--display:'Fraunces',serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:calc(env(safe-area-inset-top) + 28px) 24px calc(env(safe-area-inset-bottom) + 28px);background-image:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(199,117,20,.12),transparent 60%)}
.brand{display:flex;align-items:center;gap:13px;justify-content:center;margin-bottom:30px}
.mark{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,#F2A03D,#E07F1A);display:grid;place-items:center;box-shadow:0 10px 28px rgba(199,117,20,.35)}
.mark svg{width:28px;height:28px}
.brand h1{font-family:var(--display);font-size:27px;font-weight:600;letter-spacing:-.02em;line-height:1}
.brand .tag{font-family:var(--mono);font-size:9px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.16em;margin-top:4px}
.card{background:linear-gradient(160deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:22px;padding:24px}
.card h2{font-size:17px;font-weight:600;margin-bottom:4px}
.card p{font-size:13px;color:var(--ink-dim);margin-bottom:20px}
.fld{margin-bottom:15px}
.fld label{display:block;font-family:var(--mono);font-size:9.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.fld input{width:100%;background:var(--bg);border:1px solid var(--line-2);border-radius:13px;padding:15px;color:var(--ink);font-size:16px;outline:none;transition:border-color .15s}
.fld input:focus{border-color:#E07F1A}
.btn{width:100%;background:linear-gradient(135deg,#F2A03D,#E07F1A);color:#2A1A05;border:none;border-radius:13px;padding:16px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;min-height:54px;transition:.15s}
.btn:active{transform:scale(.98)} .btn:disabled{opacity:.6}
.err{color:var(--red);font-size:13px;margin-top:13px;text-align:center;min-height:18px}
.foot{text-align:center;font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:20px}
</style>
</head>
<body>
<div class="brand">
  <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#2A1A05" stroke-width="2.2"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7M5.5 21a2 2 0 100-4 2 2 0 000 4zM18.5 21a2 2 0 100-4 2 2 0 000 4z"/></svg></div>
  <div><h1>AIPROTECH</h1><div class="tag">Repartidor</div></div>
</div>
<div class="card">
  <h2>Inicia sesión</h2>
  <p>Ingresa con tu usuario y clave (patente).</p>
  <form id="form" onsubmit="entrar(event)">
    <div class="fld"><label for="usuario">Usuario</label><input id="usuario" name="usuario" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" autofocus required></div>
    <div class="fld"><label for="clave">Clave</label><input id="clave" name="clave" type="password" autocomplete="current-password" required></div>
    <button class="btn" id="btn" type="submit">Entrar</button>
    <div class="err" id="err"></div>
  </form>
</div>
<div class="foot">Acceso seguro · JWT</div>
<script>
if (CPAuth.valido()) location.replace('./repartidor.html');
function entrar(e){
  e.preventDefault();
  var u=document.getElementById('usuario').value.trim().toLowerCase();
  var c=document.getElementById('clave').value;
  var btn=document.getElementById('btn'), err=document.getElementById('err');
  err.textContent=''; btn.disabled=true; btn.textContent='Verificando…';
  CPAuth.login(u,c).then(function(){
    location.replace('./repartidor.html');
  }).catch(function(ex){
    err.textContent=(ex&&ex.message)?ex.message:'Sin conexión. Reintenta.';
    btn.disabled=false; btn.textContent='Entrar';
  });
}
</script>
</body>
</html>
